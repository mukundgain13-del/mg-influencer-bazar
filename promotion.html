<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MG AI - Free Promotion</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --primary: #1a73e8; --green: #28a745; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; padding: 15px; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 400px; width: 100%; text-align: center; }
        
        #final-form { display: none; margin-top: 20px; text-align: left; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .submit-btn { background: var(--green); color: white; padding: 15px; border: none; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .welcome-msg { color: var(--primary); font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:var(--primary);">MG AI Studio</h2>
    <div id="login-box">
        <p>प्रमोशन शुरू करने के लिए लॉगिन करें</p>
        <div id="g_id_onload" data-client_id="450172090515-rb0rdcqvatbjl3glt8g1g8spm9307c41.apps.googleusercontent.com" data-callback="onLogin"></div>
        <div class="g_id_signin" data-type="standard"></div>
    </div>

    <div id="final-form">
        <p class="welcome-msg" id="user-mail"></p>
        <h3 style="color:var(--green)">फ्री चैनल प्रमोशन फॉर्म</h3>
        <label>आपका चैनल नाम:</label>
        <input type="text" id="chName" placeholder="जैसे: Indo148mg">
        <label>चैनल की लिंक:</label>
        <input type="url" id="chLink" placeholder="https://youtube.com/@...">
        <button class="submit-btn" onclick="sendData()">सबमिट करें</button>
    </div>
</div>

<script>
    let email = "";

    function onLogin(res) {
        const d = JSON.parse(atob(res.credential.split('.')[1]));
        email = d.email;
        document.getElementById("login-box").style.display = "none";
        document.getElementById("user-mail").innerText = "लॉगिन सफल: " + email;
        document.getElementById("final-form").style.display = "block";
    }

    function sendData() {
        const n = document.getElementById("chName").value;
        const l = document.getElementById("chLink").value;
        if(!n || !l) { alert("विवरण भरें!"); return; }

        fetch("https://script.google.com/macros/s/AKfycbwW4nfOvVDRDetUb4ecqAqt-Io2v8n9UKUmvZ5BNU38c4IkIgKgtbaT_ckm70wrdaNHMA/exec", {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
                email: email,
                channelName: n,
                channelLink: l,
                plan: "Early Bird Free",
                transactionId: "N/A"
            })
        }).then(() => {
            alert("बधाई हो! आपका चैनल फ्री प्रमोशन के लिए रजिस्टर हो गया है।");
            location.reload();
        });
    }
</script>
</body>
</html>
