<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MG AI Assistant</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #1e293b; padding: 15px; display: flex; align-items: center; border-bottom: 2px solid #3b82f6; }
        .back-link { color: white; text-decoration: none; font-size: 24px; margin-right: 15px; }
        #chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 12px 16px; border-radius: 15px; max-width: 80%; font-size: 16px; line-height: 1.5; }
        .user-msg { background: #3b82f6; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai-msg { background: #334155; align-self: flex-start; border-bottom-left-radius: 2px; }
        .input-area { background: #1e293b; padding: 12px; display: flex; gap: 10px; border-top: 1px solid #334155; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #3b82f6; background: #0f172a; color: white; outline: none; }
        button { background: #3b82f6; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-link">⬅</a>
    <h3 style="margin:0;">🤖 MG AI असिस्टेंट</h3>
</header>

<div id="chat-container">
    <div class="message ai-msg">नमस्ते मुकुंद! मैं तैयार हूँ। आप मुझसे बोलकर या लिखकर कुछ भी पूछ सकते हैं।</div>
</div>

<div class="input-area">
    <button onclick="startListening()">🎤</button>
    <input type="text" id="userInput" placeholder="यहाँ लिखें...">
    <button onclick="sendMessage()">🚀</button>
</div>

<script>
    const API_KEY = "AIzaSyA2EWy9ujEN8z-YNtYwDcUl1qvgkAZ845w";

    function speak(text) {
        const synth = window.speechSynthesis;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'hi-IN';
        synth.speak(utterance);
    }

    function startListening() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'hi-IN';
        recognition.start();
        recognition.onresult = (event) => {
            document.getElementById('userInput').value = event.results[0][0].transcript;
            sendMessage();
        };
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const container = document.getElementById('chat-container');
        const text = input.value.trim();

        if (!text) return;

        container.innerHTML += `<div class="message user-msg">${text}</div>`;
        input.value = "";
        container.scrollTop = container.scrollHeight;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });
            const data = await response.json();
            const reply = data.candidates[0].content.parts[0].text;

            container.innerHTML += `<div class="message ai-msg">${reply}</div>`;
            speak(reply);
        } catch (error) {
            container.innerHTML += `<div class="message ai-msg">क्षमा करें, कुछ तकनीकी दिक्कत आ गई है।</div>`;
        }
        container.scrollTop = container.scrollHeight;
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>

</body>
</html>
