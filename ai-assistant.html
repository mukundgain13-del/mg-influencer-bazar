<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MG AI Assistant</title>
    <style>
        body { font-family: sans-serif; background: #ffffff; color: #000; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #3b82f6; color: white; padding: 15px; text-align: center; font-weight: bold; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; background: #f9f9f9; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 10px; max-width: 80%; line-height: 1.5; }
        .user { background: #dcf8c6; align-self: flex-end; }
        .ai { background: #ebebeb; align-self: flex-start; }
        .input-area { padding: 10px; display: flex; gap: 10px; background: #fff; border-top: 1px solid #ccc; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; outline: none; }
        button { background: #3b82f6; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<header>🤖 MG AI असिस्टेंट</header>

<div id="chat-box">
    <div class="msg ai">नमस्ते मुकुंद! मैं तैयार हूँ। आप कुछ लिखकर या बोलकर पूछ सकते हैं।</div>
</div>

<div class="input-area">
    <button onclick="startVoice()">🎤</button>
    <input type="text" id="userInput" placeholder="यहाँ लिखें...">
    <button onclick="askAI()">पूछें</button>
</div>

<script>
    const API_KEY = "AIzaSyA2EWy9ujEN8z-YNtYwDcUl1qvgkAZ845w";

    // बोलकर सुनाने का फंक्शन
    function speak(text) {
        window.speechSynthesis.cancel(); // पुराना बोलना बंद करें
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'hi-IN';
        window.speechSynthesis.speak(utter);
    }

    // माइक से सुनने का फंक्शन
    function startVoice() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return alert("आपका फोन वॉइस सपोर्ट नहीं करता।");
        const rec = new SpeechRecognition();
        rec.lang = 'hi-IN';
        rec.start();
        rec.onresult = (e) => {
            document.getElementById('userInput').value = e.results[0][0].transcript;
            askAI();
        };
    }

    async function askAI() {
        const input = document.getElementById('userInput');
        const box = document.getElementById('chat-box');
        const text = input.value.trim();
        if (!text) return;

        box.innerHTML += `<div class="msg user"><b>आप:</b> ${text}</div>`;
        input.value = "";
        box.scrollTop = box.scrollHeight;

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });

            const data = await res.json();
            const reply = data.candidates[0].content.parts[0].text;

            box.innerHTML += `<div class="msg ai"><b>AI:</b> ${reply}</div>`;
            speak(reply); // AI बोलेगा
        } catch (e) {
            box.innerHTML += `<div class="msg ai" style="color:red;">एरर: सर्वर कनेक्ट नहीं हुआ। अपना इंटरनेट चेक करें।</div>`;
            console.error(e);
        }
        box.scrollTop = box.scrollHeight;
    }
</script>

</body>
</html>
