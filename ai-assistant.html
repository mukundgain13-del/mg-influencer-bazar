<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MG AI Assistant</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; padding: 10px; }
        #chat { height: 70vh; overflow-y: auto; border: 1px solid #333; padding: 10px; margin-bottom: 10px; }
        .input-box { display: flex; gap: 5px; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #007bff; color: #fff; border: none; border-radius: 5px; }
        .user { color: #00ff00; margin: 5px 0; }
        .ai { color: #00ccff; margin: 5px 0; border-bottom: 1px solid #222; padding-bottom: 5px; }
    </style>
</head>
<body>

    <h3>🤖 MG AI असिस्टेंट</h3>
    <div id="chat">
        <p class="ai">नमस्ते मुकुंद! मैं तैयार हूँ। कुछ पूछिए...</p>
    </div>

    <div class="input-box">
        <input type="text" id="userInput" placeholder="यहाँ लिखें...">
        <button onclick="askAI()">भेजें</button>
    </div>

    <script>
        async function askAI() {
            const input = document.getElementById('userInput');
            const box = document.getElementById('chat');
            const key = "AIzaSyA2EWy9ujEN8z-YNtYwDcUl1qvgkAZ845w";
            const text = input.value;

            if (!text) return;

            box.innerHTML += `<p class="user"><b>आप:</b> ${text}</p>`;
            input.value = "";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });
                
                const data = await response.json();
                const reply = data.candidates[0].content.parts[0].text;
                
                box.innerHTML += `<p class="ai"><b>AI:</b> ${reply}</p>`;
                box.scrollTop = box.scrollHeight;
            } catch (err) {
                box.innerHTML += `<p class="ai" style="color:red;">एरर: कनेक्ट नहीं हो पाया।</p>`;
            }
        }
    </script>
</body>
</html>
