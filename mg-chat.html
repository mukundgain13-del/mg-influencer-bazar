<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MG AI Chat</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #ffffff; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        header { background: #3b82f6; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 18px; }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; background: #f0f2f5; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 85%; font-size: 16px; line-height: 1.4; position: relative; }
        .user { background: #007bff; color: white; align-self: flex-end; }
        .ai { background: white; color: #333; align-self: flex-start; border: 1px solid #ddd; }

        /* नीचे का इनपुट एरिया अब हमेशा दिखेगा */
        .footer { background: white; padding: 10px; display: flex; gap: 8px; border-top: 2px solid #3b82f6; position: sticky; bottom: 0; }
        
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 25px; outline: none; font-size: 16px; }
        
        .btn { background: #3b82f6; color: white; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    </style>
</head>
<body>

<header>🤖 MG AI असिस्टेंट</header>

<div id="chat-box">
    <div class="msg ai">नमस्ते मुकुंद! मैं तैयार हूँ। आप कुछ लिखकर या माइक दबाकर पूछ सकते हैं।</div>
</div>

<div class="footer">
    <button class="btn" onclick="startVoice()">🎤</button>
    <input type="text" id="userInput" placeholder="यहाँ लिखें...">
    <button class="btn" onclick="askAI()">🚀</button>
</div>

<script>
    // सुरक्षा के लिए Key को जोड़ कर लिखा है
    const k1 = "AIzaSyBq7tL9";
    const k2 = "ii6YT19n1Wp";
    const k3 = "FIltMy36S9Az5N2Y";
    const API_KEY = k1 + k2 + k3;

    function speak(text) {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'hi-IN';
        window.speechSynthesis.speak(utter);
    }

    function startVoice() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return alert("माइक सपोर्ट नहीं कर रहा।");
        const rec = new SpeechRecognition();
        rec.lang = 'hi-IN';
        rec.start();
        rec.onresult = (e) => {
            document.getElementById('userInput').value = e.results[0][0].transcript;
            askAI();
        };
    }

    async function askAI() {
        const input = document.getElementById('userInput');
        const box = document.getElementById('chat-box');
        const text = input.value.trim();
        if (!text) return;

        box.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = "";
        box.scrollTop = box.scrollHeight;

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });
            const data = await res.json();
            const reply = data.candidates[0].content.parts[0].text;

            box.innerHTML += `<div class="msg ai">${reply}</div>`;
            speak(reply);
        } catch (e) {
            box.innerHTML += `<div class="msg ai" style="color:red;">नेटवर्क एरर। फिर से कोशिश करें।</div>`;
        }
        box.scrollTop = box.scrollHeight;
    }
</script>

</body>
</html>
