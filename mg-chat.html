<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MG AI स्टूडियो - मुकुंद गेन</title>
    <style>
        body { margin: 0; background: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #ff0000; padding: 15px; text-align: center; font-weight: bold; border-bottom: 2px solid gold; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 15px; max-width: 80%; }
        .user { align-self: flex-end; background: #ff0000; }
        .ai { align-self: flex-start; background: #2c2c2c; border: 1px solid #444; }
        #lock-screen { display: none; text-align: center; padding: 40px 20px; background: #1a1a1a; position: absolute; top: 60px; bottom: 0; left: 0; right: 0; z-index: 100; }
        .btn { background: #25d366; color: white; padding: 15px; border-radius: 10px; text-decoration: none; display: inline-block; margin-top: 10px; font-weight: bold; }
        #input-area { padding: 15px; display: flex; gap: 10px; background: #1e1e1e; border-top: 1px solid #ff0000; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: none; background: #333; color: white; }
        button { background: #ff0000; color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">🪄 MG AI स्टूडियो (Premium)</div>
    
    <div id="lock-screen">
        <h2 style="color: gold;">⌛ आपका फ्री ट्रायल खत्म!</h2>
        <p>आगे इस्तेमाल करने के लिए प्रीमियम प्लान लें।</p>
        <div style="background: #333; padding: 15px; border-radius: 10px; margin: 20px 0;">
            <p><b>UPI ID:</b> 9897414148@ptaxis</p>
            <p>₹199 (1 महीना) / ₹499 (1 साल)</p>
        </div>
        <a href="https://wa.me/919897414148?text=I%20want%20Premium%20Access" class="btn">व्हाट्सएप पर स्क्रीनशॉट भेजें</a>
        <div style="margin-top: 30px;">
            <input type="text" id="pass-input" placeholder="पासवर्ड डालें" style="width: 150px;">
            <button onclick="unlock()">अनलॉक करें</button>
        </div>
    </div>

    <div id="chat"></div>
    
    <div id="input-area">
        <input type="text" id="msg-input" placeholder="पूछें (नागिन स्क्रिप्ट या प्रॉम्प्ट)...">
        <button onclick="sendMsg()">भेजें</button>
    </div>

<script>
    const SECRET_PASS = "MG2026"; // मुकुंद भाई आपका पासवर्ड

    // ट्रायल चेक करने का फंक्शन
    function checkTrial() {
        let startTime = localStorage.getItem('mg_start');
        let isPremium = localStorage.getItem('mg_premium');

        if (isPremium === 'true') return; // अगर प्रीमियम है तो कुछ न करें

        if (!startTime) {
            localStorage.setItem('mg_start', Date.now());
        } else {
            let hoursPassed = (Date.now() - startTime) / (1000 * 60 * 60);
            if (hoursPassed > 48) { // 2 दिन (48 घंटे) के बाद लॉक
                document.getElementById('lock-screen').style.display = 'block';
            }
        }
    }

    function unlock() {
        const pass = document.getElementById('pass-input').value;
        if (pass === SECRET_PASS) {
            localStorage.setItem('mg_premium', 'true');
            alert("मुकुंद भाई की ओर से आपका प्रीमियम मोड चालू हो गया है!");
            location.reload();
        } else {
            alert("गलत पासवर्ड! कृपया पेमेंट करके व्हाट्सएप पर मांगें।");
        }
    }

    async function sendMsg() {
        const input = document.getElementById('msg-input');
        const box = document.getElementById('chat');
        const text = input.value.trim();
        if(!text) return;

        box.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = "";
        box.scrollTop = box.scrollHeight;

        try {
            const res = await fetch('https://mg-ai-engine.mukundgain.workers.dev', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            const data = await res.json();
            const reply = data.candidates[0].content.parts[0].text;
            box.innerHTML += `<div class="msg ai">${reply}</div>`;
        } catch (e) {
            box.innerHTML += `<div class="msg ai">नेटवर्क एरर! दोबारा भेजें।</div>`;
        }
        box.scrollTop = box.scrollHeight;
    }

    checkTrial();
</script>
</body>
</html>
