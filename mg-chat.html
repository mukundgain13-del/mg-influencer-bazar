<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MG AI जादुई चैट</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #1a1a1a; /* डार्क बैकग्राउंड */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: Arial, sans-serif;
        }
        .loading { text-align: center; }
    </style>
</head>
<body>

    <div class="loading">
        <h2>MG AI जादू शुरू हो रहा है...</h2>
        <p>कृपया एक सेकंड रुकें</p>
    </div>

    <script src="https://cdn.botpress.cloud/webchat/v2.1/inject.js"></script>
    <script src="https://mediafiles.botpress.cloud/a86f1e6b-6789-4d6d-92d5-456789abcdef/webchat/config.js"></script>

    <script>
        // यह पेज खुलते ही चैट बॉक्स को अपने आप बड़ा (Open) कर देगा
        window.botpressWebChat.onEvent(function () {
            window.botpressWebChat.sendEvent({ type: 'show' });
            window.botpressWebChat.sendEvent({ type: 'open' });
        }, ['LIFECYCLE.LOADED']);
    </script>

</body>
</html>
