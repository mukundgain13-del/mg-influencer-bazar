<script>
    // आपकी ताज़ा नई चाबी का Base64 कोड
    const encodedKey = "QUl6YVN5QUZxa3VLQW8wMkVYQTVNSWE1Y2l0ODRJQkdJT3drSFIw"; 

    const getSecretKey = () => {
        try {
            return atob(encodedKey.trim());
        } catch(e) {
            return "ERROR";
        }
    };

    async function askAI() {
        const input = document.getElementById('userInput');
        const box = document.getElementById('chat-box');
        const text = input.value.trim();
        if (!text) return;

        box.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = "";
        box.scrollTop = box.scrollHeight;

        const apiKey = getSecretKey();
        if(apiKey === "ERROR") {
            box.innerHTML += `<div class="msg ai" style="color:red;">Error: Base64 कोड सही नहीं है।</div>`;
            return;
        }

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });

            const data = await res.json();
            
            if (data.error) {
                // यह बताएगा कि असली दिक्कत क्या है (जैसे: API Key Invalid या Blocked)
                box.innerHTML += `<div class="msg ai" style="color:red;">Google Error: ${data.error.message}</div>`;
            } else if (data.candidates && data.candidates[0].content) {
                const reply = data.candidates[0].content.parts[0].text;
                box.innerHTML += `<div class="msg ai">${reply}</div>`;
                speak(reply);
            } else {
                box.innerHTML += `<div class="msg ai" style="color:red;">कोई जवाब नहीं मिला।</div>`;
            }
        } catch (e) {
            box.innerHTML += `<div class="msg ai" style="color:red;">कनेक्शन फेल। इंटरनेट चेक करें।</div>`;
        }
        box.scrollTop = box.scrollHeight;
    }
    
    function speak(text) {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'hi-IN';
        window.speechSynthesis.speak(utter);
    }
</script>
