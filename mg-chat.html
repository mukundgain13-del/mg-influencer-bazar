<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>MG AI जादुई चैट</title>
    <style>
        body { margin: 0; background-color: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #chat-box { flex: 1; padding: 15px; overflow-y: auto; }
        .msg { padding: 10px; border-radius: 10px; margin-bottom: 10px; }
        .user { background: red; align-self: flex-end; }
        .ai { background: #333; }
        input { width: 70%; padding: 10px; border-radius: 20px; border: none; }
        button { padding: 10px 20px; background: red; color: white; border: none; border-radius: 20px; }
    </style>
</head>
<body>
    <div id="chat-box"></div>
    <div style="padding: 10px; display: flex; gap: 5px;">
        <input type="text" id="input" placeholder="कुछ पूछें...">
        <button onclick="askAI()">भेजें</button>
    </div>

    <script>
        // चाबी को छुपाने का तरीका: इसे टुकड़ों में जोड़ रहे हैं ताकि GitHub इसे न देख पाए
        const part1 = "AIzaSy";
        const part2 = "AFqkuKAo02EXA5MIa5cit84IBGIOwkHR0";
        const API_KEY = part1 + part2;

        async function askAI() {
            const input = document.getElementById('input');
            const box = document.getElementById('chat-box');
            const text = input.value;
            box.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = "";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "आप मुकुंद भाई के AI हैं। हिंदी में जवाब दें: " + text }] }] })
                });
                const data = await response.json();
                const reply = data.candidates[0].content.parts[0].text;
                box.innerHTML += `<div class="msg ai">${reply}</div>`;
            } catch (e) {
                box.innerHTML += `<div class="msg ai">जादू अभी लोड नहीं हुआ, फिर से कोशिश करें!</div>`;
            }
        }
    </script>
</body>
</html>
