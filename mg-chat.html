<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MG AI स्टूडियो</title>
    <style>
        body { margin: 0; background: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #ff0000; padding: 15px; text-align: center; font-weight: bold; border-bottom: 2px solid gold; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #121212; }
        .msg { padding: 12px; border-radius: 15px; max-width: 80%; font-size: 16px; }
        .user { align-self: flex-end; background: #ff0000; color: white; }
        .ai { align-self: flex-start; background: #2c2c2c; border: 1px solid #444; }
        #input-area { padding: 15px; display: flex; gap: 10px; background: #1e1e1e; border-top: 1px solid #333; position: sticky; bottom: 0; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #444; background: #333; color: white; outline: none; }
        button { background: #ff0000; color: white; border: none; padding: 10px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        #lock-screen { display: none; text-align: center; padding: 40px 20px; background: #121212; position: fixed; top: 0; bottom: 0; left: 0; right: 0; z-index: 9999; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h2 style="color: gold;">⌛ ट्रायल खत्म!</h2>
        <p>प्रीमियम एक्सेस के लिए ₹199 पे करें</p>
        <p><b>UPI:</b> 9897414148@ptaxis</p>
        <a href="https://wa.me/919897414148" style="color: #25d366; text-decoration: none; font-weight: bold;">व्हाट्सएप करें</a>
        <br><br>
        <input type="text" id="pass-input" placeholder="पासवर्ड डालें" style="width: 150px;">
        <button onclick="unlock()">अनलॉक</button>
    </div>

    <div class="header">🪄 MG AI स्टूडियो (Premium)</div>

    <div id="chat">
        <div class="msg ai">नमस्ते मुकुंद भाई! आपका अपना AI स्टूडियो अब पूरी तरह सुरक्षित और तैयार है। कुछ पूछिए!</div>
    </div>

    <div id="input-area">
        <input type="text" id="msg-input" placeholder="यहाँ लिखें...">
        <button onclick="sendMsg()">भेजें</button>
    </div>

<script>
    const SECRET_PASS = "MG2026";

    function checkTrial() {
        if (localStorage.getItem('mg_premium') === 'true') return;
        let start = localStorage.getItem('mg_start');
        if (!start) {
            localStorage.setItem('mg_start', Date.now());
        } else {
            if ((Date.now() - start) / (1000 * 60 * 60) > 48) {
                document.getElementById('lock-screen').style.display = 'block';
            }
        }
    }

    function unlock() {
        if (document.getElementById('pass-input').value === SECRET_PASS) {
            localStorage.setItem('mg_premium', 'true');
            location.reload();
        } else { alert("गलत पासवर्ड!"); }
    }

    async function sendMsg() {
        const input = document.getElementById('msg-input');
        const box = document.getElementById('chat');
        const text = input.value.trim();
        if(!text) return;

        box.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = "";
        box.scrollTop = box.scrollHeight;

        try {
            // हमने यहाँ सिर्फ '/api' रखा है क्योंकि आपकी फाइल api/index.js है
            const res = await fetch('/api', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            
            const data = await res.json();
            
            if (data && data.candidates) {
                const reply = data.candidates[0].content.parts[0].text;
                box.innerHTML += `<div class="msg ai">${reply}</div>`;
            } else {
                box.innerHTML += `<div class="msg ai">मुकुंद भाई, चाबी (Key) में कोई दिक्कत लग रही है। एक बार Vercel Settings चेक करें।</div>`;
            }
        } catch (e) {
            box.innerHTML += `<div class="msg ai">सर्वर कनेक्ट नहीं हो पाया। कृपया 1 मिनट बाद ट्राई करें।</div>`;
        }
        box.scrollTop = box.scrollHeight;
    }
    checkTrial();
</script>
</body>
</html>
