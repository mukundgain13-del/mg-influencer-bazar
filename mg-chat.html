<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mg AI Updates - Assistant</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #ffffff; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100dvh; 
        }
        /* ऊपर का हिस्सा */
        header { 
            background: #ffffff; 
            color: #3b82f6; 
            padding: 12px; 
            text-align: center; 
            font-weight: bold; 
            border-bottom: 1px solid #eee;
            font-size: 20px;
        }
        /* चैट वाला हिस्सा */
        #chat-box { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            background: #f7f9fb; 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            padding-bottom: 80px; /* ताकि मैसेज इनपुट के पीछे न छुपें */
        }
        .msg { padding: 12px 16px; border-radius: 20px; max-width: 85%; font-size: 16px; line-height: 1.5; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .user { background: #3b82f6; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai { background: white; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }

        /* नीचे का इनपुट एरिया - अब यह हिलेगा नहीं */
        .footer { 
            background: white; 
            padding: 12px; 
            display: flex; 
            gap: 10px; 
            border-top: 1px solid #eee; 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            z-index: 100;
        }
        input { 
            flex: 1; 
            padding: 12px 18px; 
            border-radius: 25px; 
            border: 1px solid #ddd; 
            outline: none; 
            font-size: 16px; 
        }
        .btn { 
            background: #3b82f6; 
            color: white; 
            border: none; 
            width: 48px; 
            height: 48px; 
            border-radius: 50%; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 22px; 
        }
    </style>
</head>
<body>

<header>🤖 Mg AI Updates</header>

<div id="chat-box">
    <div class="msg ai">नमस्ते मुकुंद! मैं Mg AI असिस्टेंट हूँ। पूछिए, मैं आपकी क्या मदद करूँ?</div>
</div>

<div class="footer">
    <button class="btn" onclick="startVoice()">🎤</button>
    <input type="text" id="userInput" placeholder="यहाँ लिखें या बोलें...">
    <button class="btn" onclick="askAI()">🚀</button>
</div>

<script>
    const k1 = "AIzaSyBq7tL9";
    const k2 = "ii6YT19n1Wp";
    const k3 = "FIltMy36S9Az5N2Y";
    const API_KEY = k1 + k2 + k3;

    function speak(text) {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'hi-IN';
        window.speechSynthesis.speak(utter);
    }

    function startVoice() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return alert("वॉइस सपोर्ट नहीं है।");
        const rec = new SpeechRecognition();
        rec.lang = 'hi-IN';
        rec.start();
        rec.onresult = (e) => {
            document.getElementById('userInput').value = e.results[0][0].transcript;
            askAI();
        };
    }

    async function askAI() {
        const input = document.getElementById('userInput');
        const box = document.getElementById('chat-box');
        const text = input.value.trim();
        if (!text) return;

        box.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = "";
        box.scrollTop = box.scrollHeight;

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });
            const data = await res.json();
            const reply = data.candidates[0].content.parts[0].text;
            box.innerHTML += `<div class="msg ai">${reply}</div>`;
            speak(reply);
        } catch (e) {
            box.innerHTML += `<div class="msg ai" style="color:red;">कनेक्शन एरर। फिर से कोशिश करें।</div>`;
        }
        box.scrollTop = box.scrollHeight;
    }
</script>

</body>
</html>
