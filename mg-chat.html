<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MG AI जादुई चैट</title>
    <style>
        body { margin: 0; padding: 0; background-color: #1a1a1a; font-family: sans-serif; color: white; display: flex; flex-direction: column; height: 100vh; }
        .header { background: red; padding: 15px; text-align: center; font-weight: bold; border-bottom: 2px solid #333; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 85%; font-size: 16px; line-height: 1.4; }
        .user { align-self: flex-end; background: #ff0000; color: white; }
        .ai { align-self: flex-start; background: #333; border: 1px solid #444; }
        #input-area { padding: 15px; background: #222; display: flex; gap: 8px; border-top: 2px solid red; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: none; font-size: 16px; outline: none; background: #333; color: white; }
        button { background: red; color: white; border: none; padding: 10px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">🪄 MG AI जादुई असिस्टेंट</div>
<div id="chat-box">
    <div class="msg ai">नमस्ते मुकुंद भाई के दोस्त! ✨<br>मैं तैयार हूँ। मुझसे कोई भी सीरियल स्क्रिप्ट लिखवाएं या 'Plan' लिखकर हमारे ऑफर देखें।</div>
</div>

<div id="input-area">
    <input type="text" id="msg-input" placeholder="यहाँ लिखें...">
    <button onclick="send()">भेजें</button>
</div>

<script>
    // यह कोड वरिसल की सेटिंग से आपकी चाबी उठाएगा
    const API_KEY = process.env.GEMINI_API_KEY || ""; 

    async function send() {
        const input = document.getElementById('msg-input');
        const box = document.getElementById('chat-box');
        const text = input.value.trim();
        if(!text) return;

        box.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = "";
        box.scrollTop = box.scrollHeight;

        // प्लान की जानकारी
        if(text.toLowerCase().includes('plan')) {
            box.innerHTML += `<div class="msg ai">💎 **MG AI स्पेशल प्लान:**<br>🎁 2 दिन फ्री ट्रायल!<br>🪄 ₹69/हफ्ता<br>🚀 ₹199/महीना<br>👑 ₹499/साल<br><br><b>UPI ID:</b> 9897414148@ptaxis</div>`;
            return;
        }

        if(!API_KEY) {
            box.innerHTML += `<div class="msg ai">त्रुटि: वरिसल में चाबी नहीं मिल रही है। कृपया वरिसल सेटिंग्स चेक करें।</div>`;
            return;
        }

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({contents: [{parts: [{text: "You are an AI for Mukund Gain. Write scripts in Hindi for: " + text}]}]})
            });
            const data = await res.json();
            const reply = data.candidates[0].content.parts[0].text;
            box.innerHTML += `<div class="msg ai">${reply}</div>`;
        } catch (e) {
            box.innerHTML += `<div class="msg ai">क्षमा करें, अभी कनेक्शन नहीं हो पा रहा है।</div>`;
        }
        box.scrollTop = box.scrollHeight;
    }
</script>
</body>
</html>
