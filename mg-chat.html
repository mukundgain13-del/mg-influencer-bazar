<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MG AI स्टूडियो</title>
    <style>
        body { margin: 0; background: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #ff0000; padding: 15px; text-align: center; font-weight: bold; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 15px; max-width: 80%; }
        .user { align-self: flex-end; background: #ff0000; }
        .ai { align-self: flex-start; background: #2c2c2c; border: 1px solid #444; }
        #input-area { padding: 15px; display: flex; gap: 10px; background: #1e1e1e; border-top: 1px solid #ff0000; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: none; background: #333; color: white; outline: none; }
        button { background: #ff0000; color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">🪄 MG AI स्टूडियो लाइव</div>
    <div id="chat">
        <div class="msg ai">नमस्ते मुकुंद भाई! अगर इंजन काम कर रहा है, तो यहाँ जवाब आएगा। कुछ लिखकर चेक करें।</div>
    </div>
    <div id="input-area">
        <input type="text" id="msg-input" placeholder="यहाँ लिखें...">
        <button onclick="sendMsg()">भेजें</button>
    </div>

<script>
    async function sendMsg() {
        const input = document.getElementById('msg-input');
        const box = document.getElementById('chat');
        const text = input.value.trim();
        if(!text) return;

        box.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = "";
        box.scrollTop = box.scrollHeight;

        try {
            // हमने URL के अंत में / जोड़ दिया है और mode को ठीक किया है
            const res = await fetch('https://mg-ai-engine.mukundgain.workers.dev/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            
            const data = await res.json();
            console.log(data); // चेक करने के लिए

            if(data && data.candidates) {
                const reply = data.candidates[0].content.parts[0].text;
                box.innerHTML += `<div class="msg ai">${reply}</div>`;
            } else {
                box.innerHTML += `<div class="msg ai">इंजन से खाली जवाब मिला। एक बार और कोशिश करें।</div>`;
            }
        } catch (e) {
            console.error(e);
            box.innerHTML += `<div class="msg ai">अभी भी जुड़ने में दिक्कत है। मुकुंद भाई, एक बार क्लाउडफ्लेयर में 'Deploy' बटन दोबारा दबाएं।</div>`;
        }
        box.scrollTop = box.scrollHeight;
    }
</script>
</body>
</html>
