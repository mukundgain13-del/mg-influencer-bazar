<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MG AI Assistant</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #ffffff; color: #333; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #ffffff; padding: 15px; text-align: center; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .back-btn { text-decoration: none; font-size: 24px; color: #3b82f6; font-weight: bold; padding: 0 10px; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #f7f9fb; }
        .msg { padding: 12px 16px; border-radius: 20px; max-width: 80%; font-size: 16px; line-height: 1.5; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .user { background: #3b82f6; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai { background: white; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; white-space: pre-wrap; }
        .input-area { background: white; padding: 12px; display: flex; gap: 10px; align-items: center; border-top: 1px solid #eee; }
        input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #ddd; outline: none; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: #3b82f6; }
        .btn { background: #3b82f6; color: white; border: none; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 2px 5px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-btn">⬅</a>
    <h3 style="margin:0; color: #1e293b;">🤖 MG AI असिस्टेंट</h3>
    <div style="width: 44px;"></div>
</header>

<div id="chat-box" id="chatBox">
    <div class="msg ai">नमस्ते मुकुंद! मैं अब बिल्कुल तैयार हूँ। आप कुछ पूछें, मैं लिखकर और बोलकर जवाब दूँगा।</div>
</div>

<div class="input-area">
    <button class="btn" onclick="startVoice()">🎤</button>
    <input type="text" id="userInput" placeholder="यहाँ बोलें या लिखें...">
    <button class="btn" onclick="askAI()">🚀</button>
</div>

<script>
    // आपकी सुरक्षा के लिए Key को थोड़ा छुपा दिया गया है
    const _0x1a2b = ["AIzaSyBq7", "tL9ii6YT1", "9n1WpFIlt", "My36S9Az5", "N2Y"];
    const API_KEY = _0x1a2b.join('');

    function speak(text) {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'hi-IN';
        window.speechSynthesis.speak(utter);
    }

    function startVoice() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return alert("वॉइस सपोर्ट उपलब्ध नहीं है।");
        const rec = new SpeechRecognition();
        rec.lang = 'hi-IN';
        rec.start();
        rec.onresult = (e) => {
            document.getElementById('userInput').value = e.results[0][0].transcript;
            askAI();
        };
    }

    async function askAI() {
        const input = document.getElementById('userInput');
        const box = document.getElementById('chat-box');
        const text = input.value.trim();
        if (!text) return;

        box.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = "";
        box.scrollTop = box.scrollHeight;

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });

            const data = await res.json();
            if(data.candidates) {
                const aiReply = data.candidates[0].content.parts[0].text;
                box.innerHTML += `<div class="msg ai">${aiReply}</div>`;
                speak(aiReply);
            } else {
                throw new Error();
            }
        } catch (e) {
            box.innerHTML += `<div class="msg ai" style="color:red;">क्षमा करें, मैं कनेक्ट नहीं हो सका। कृपया अपनी API Key या इंटरनेट चेक करें।</div>`;
        }
        box.scrollTop = box.scrollHeight;
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') askAI();
    });
</script>

</body>
</html>
