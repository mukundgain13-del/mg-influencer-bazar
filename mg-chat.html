<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mg AI Updates</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: white; padding: 15px; text-align: center; color: #3b82f6; font-weight: bold; border-bottom: 1px solid #ddd; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 15px; max-width: 80%; font-size: 16px; }
        .user { background: #3b82f6; color: white; align-self: flex-end; }
        .ai { background: white; align-self: flex-start; border: 1px solid #ddd; }
        .footer { background: white; padding: 10px; display: flex; gap: 8px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ddd; outline: none; }
        button { background: #3b82f6; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>
    <header>🤖 Mg AI Updates</header>
    <div id="chat-box"><div class="msg ai">नमस्ते मुकुंद! मैं अब पूरी तरह तैयार हूँ। पूछिए क्या पूछना है?</div></div>
    <div class="footer">
        <button onclick="startVoice()">🎤</button>
        <input type="text" id="userInput" placeholder="यहाँ लिखें...">
        <button onclick="askAI()">🚀</button>
    </div>

    <script>
        // आपकी सबसे ऊपर वाली सुरक्षित चाबी (...DcAE)
        const K1 = "AIzaSyBi14oC"; 
        const K2 = "psU8bcba2jo6P";
        const K3 = "ftKnSNHxdtDcAE";
        const KEY = K1 + K2 + K3;

        async function askAI() {
            const input = document.getElementById('userInput');
            const box = document.getElementById('chat-box');
            const text = input.value.trim();
            if(!text) return;

            box.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = "";

            try {
                // यहाँ हमने 'Content-Type' को थोड़ा बदल दिया है ताकि गूगल एरर न दे
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                    method: "POST",
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });

                const data = await response.json();
                const reply = data.candidates[0].content.parts[0].text;
                box.innerHTML += `<div class="msg ai">${reply}</div>`;
                
                // जवाब को बोलकर सुनाने के लिए
                const utter = new SpeechSynthesisUtterance(reply);
                utter.lang = 'hi-IN';
                window.speechSynthesis.speak(utter);
            } catch (e) {
                box.innerHTML += `<div class="msg ai" style="color:red;">मुकुंद, गूगल रिस्पॉन्स नहीं दे रहा। कृपया एक बार पेज रिफ्रेश करें।</div>`;
            }
            box.scrollTop = box.scrollHeight;
        }

        function startVoice() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'hi-IN';
            rec.onresult = (e) => { document.getElementById('userInput').value = e.results[0][0].transcript; askAI(); };
            rec.start();
        }
    </script>
</body>
</html>
