<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MG AI Assistant</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #ffffff; color: #333; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #f8f9fa; padding: 15px; text-align: center; border-bottom: 2px solid #3b82f6; display: flex; align-items: center; justify-content: space-between; }
        .back-btn { text-decoration: none; font-size: 24px; color: #3b82f6; padding: 0 10px; }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #f0f2f5; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 16px; line-height: 1.4; }
        .user { background: #3b82f6; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai { background: white; color: #1c1e21; align-self: flex-start; border-bottom-left-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }

        .input-area { background: white; padding: 10px; display: flex; gap: 8px; align-items: center; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ccc; outline: none; font-size: 16px; }
        .btn { background: #3b82f6; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-btn">⬅</a>
    <h3 style="margin:0; color:#1e293b;">🤖 MG AI असिस्टेंट</h3>
    <div style="width: 40px;"></div>
</header>

<div id="chat-box">
    <div class="msg ai">नमस्ते मुकुंद! मैं आपका AI असिस्टेंट हूँ। पूछिए, मैं आपकी क्या मदद करूँ?</div>
</div>

<div class="input-area">
    <button class="btn" onclick="startVoice()">🎤</button>
    <input type="text" id="userInput" placeholder="यहाँ लिखें या बोलें...">
    <button class="btn" onclick="askAI()">🚀</button>
</div>

<script>
    // आपकी API Key यहाँ सुरक्षित है
    const API_KEY = "AIzaSyA2EWy9ujEN8z-YNtYwDcUl1qvgkAZ845w"; 

    // आवाज़ में जवाब देने का फंक्शन
    function speak(text) {
        const synth = window.speechSynthesis;
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'hi-IN'; // हिंदी भाषा
        synth.speak(utter);
    }

    // माइक से सुनने का फंक्शन
    function startVoice() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'hi-IN';
        recognition.start();
        recognition.onresult = (event) => {
            document.getElementById('userInput').value = event.results[0][0].transcript;
            askAI();
        };
    }

    async function askAI() {
        const input = document.getElementById('userInput');
        const box = document.getElementById('chat-box');
        const text = input.value.trim();
        
        if (!text) return;

        // यूजर का मैसेज दिखाएँ
        box.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = "";
        box.scrollTop = box.scrollHeight;

        try {
            // गूगल जेमिनी को मैसेज भेजना
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });
            
            const data = await res.json();
            
            if(data.candidates && data.candidates[0].content.parts[0].text) {
                const aiReply = data.candidates[0].content.parts[0].text;
                // AI का जवाब दिखाएँ
                box.innerHTML += `<div class="msg ai">${aiReply}</div>`;
                // जवाब बोलकर सुनाएँ
                speak(aiReply);
            } else {
                throw new Error("No data");
            }

        } catch (e) {
            box.innerHTML += `<div class="msg ai" style="color:red;">क्षमा करें, कनेक्शन में दिक्कत है। कृपया इंटरनेट चेक करें।</div>`;
        }
        box.scrollTop = box.scrollHeight;
    }

    // Enter बटन दबाने पर मैसेज जाए
    document.getElementById('userInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') askAI();
    });
</script>

</body>
</html>
