<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MG AI Updates - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* आपकी फोटो जैसा पीला और फिरोजी बैकग्राउंड */
        html, body { height: 100%; margin: 0; }
        body { 
            display: flex; 
            flex-direction: column; 
            font-family: 'Arial', sans-serif; 
            background: linear-gradient(to bottom, #ffcc33 0%, #33cccc 100%); 
            text-align: center; 
            color: #000;
            overflow-x: hidden;
        }

        /* यह हिस्सा बीच में खाली जगह बनाए रखेगा */
        .wrapper { flex: 1; display: flex; flex-direction: column; padding: 20px; }

        /* गोल लोगो */
        .logo-box { margin-top: 10px; }
        .logo-img { width: 100px; height: 100px; border-radius: 50%; border: 4px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        /* रंगीन नाम (MG AI UPDATES) */
        h1 { font-size: 28px; margin: 15px 0; font-weight: bold; letter-spacing: 1px; }
        .m { color: #ff0000; } .g { color: #008000; } .ai { color: #0000ff; }

        /* बड़े गोल बटन्स का ग्रिड (Grid) */
        .icon-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px; 
            max-width: 450px; 
            margin: 30px auto; 
            padding: 10px;
        }

        .icon-item { text-decoration: none; color: #000; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .icon-item:hover { transform: scale(1.05); }

        /* बटन्स का बड़ा साइज (100px) */
        .circle-btn { 
            width: 95px; height: 95px; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 40px; 
            margin-bottom: 10px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.25);
            border: 3px solid #fff;
        }

        /* बटन्स के रंग */
        .bg-pink { background: #ff0066; color: #fff; } /* Shopping */
        .bg-white { background: #fff; color: #ff0000; } /* YouTube */
        .bg-blue { background: #3399ff; color: #fff; } /* Telegram */

        .btn-text { font-size: 14px; font-weight: bold; line-height: 1.2; }
        .btn-sub { font-size: 10px; color: #333; font-weight: bold; }

        /* ताज़ा खबर सेक्शन */
        .news-box { background: rgba(255,255,255,0.4); margin: 20px auto; padding: 15px; width: 95%; max-width: 550px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.6); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* बीच की खाली जगह के लिए */
        .spacer { flex: 1; }

        /* फुटर और विज़िटर काउंटर एकदम नीचे */
        .bottom-section { padding: 20px 10px; }
        .visitor-box { margin-bottom: 15px; font-weight: bold; font-family: monospace; font-size: 16px; background: rgba(0,0,0,0.05); display: inline-block; padding: 8px 15px; border-radius: 20px; }
        footer { font-size: 13px; color: #222; font-weight: bold; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="logo-box">
            <img src="https://via.placeholder.com/150/000/fff?text=MG" class="logo-img" alt="MG Logo">
        </div>

        <h1><span class="m">M</span><span class="g">G</span> <span class="ai">AI</span> UPDATES</h1>

        <div class="icon-grid">
            <a href="https://topdeal.app.link/niDWGq6PV1b" class="icon-item" target="_blank">
                <div class="circle-btn bg-pink"><i class="fas fa-shopping-cart"></i></div>
                <div class="btn-text">All in one</div>
                <div class="btn-sub">Shopping Store</div>
            </a>
            <a href="https://www.youtube.com/@INDO148MG0.2" class="icon-item" target="_blank">
                <div class="circle-btn bg-white"><i class="fab fa-youtube"></i></div>
                <div class="btn-text">Visit Our Channel</div>
            </a>
            <a href="https://t.me/Indo148mg" class="icon-item" target="_blank">
                <div class="circle-btn bg-blue"><i class="fab fa-telegram-plane"></i></div>
                <div class="btn-text">Join Telegram</div>
                <div class="btn-sub">Best Deals</div>
            </a>
        </div>

        <div class="news-box">
            <strong style="color: #d00;">ताज़ा खबर:</strong> <span style="font-size: 14px;">मुकुंद, यहाँ अपनी ताज़ा स्क्रिप्ट या ऑफर्स लिखें।</span>
        </div>

        <div class="spacer"></div>

        <div class="bottom-section">
            <div class="visitor-box">
                🟢 VISITORS: <img src="https://hitwebcounter.com/counter/counter.php?page=MGAI_FINAL_MASTER&style=0005&nbdigits=5&type=page&initCount=0" border="0" style="vertical-align: middle; margin-left: 5px;">
            </div>

            <footer>
                © 2026 MG AI Updates | Managed by Mukund
                <div style="margin-top: 5px; font-size: 11px; opacity: 0.7;">
                    <a href="#" style="color: #222; text-decoration: none;">Privacy Policy</a> | <a href="#" style="color: #222; text-decoration: none;">Contact Us</a>
                </div>
            </footer>
        </div>
    </div>

</body>
</html>
