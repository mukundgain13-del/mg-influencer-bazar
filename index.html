<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MG AI Updates - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; margin: 0; padding: 0; overflow-x: hidden;
            display: flex; flex-direction: column;
            /* आपका ओरिजिनल बैकग्राउंड सुरक्षित है */
            background: linear-gradient(to bottom, #ffcc33 0%, #33cccc 100%); 
            font-family: 'Arial', sans-serif; text-align: center; color: #000;
        }

        .main-container { 
            flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; 
            width: 100%; max-width: 850px; margin: 0 auto; 
        }

        /* आपका लोगो सेक्शन */
        .logo-box { margin-top: 20px; }
        .logo-circle {
            width: 125px; height: 125px; background: #000; border-radius: 50%;
            border: 5px solid #777; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        .logo-text { color: #fff; font-size: 55px; font-weight: 900; letter-spacing: -2px; }

        .header-section h1 { font-size: 42px; margin: 20px 0 0 0; font-weight: 900; }
        .m { color: #ff0000; } .g { color: #008000; } .ai { color: #0000ff; }
        .share-btn { color: #0066cc; font-size: 24px; font-weight: bold; text-decoration: underline; background: none; border: none; cursor: pointer; }

        /* --- नया शॉपिंग ग्रिड सेक्शन --- */
        .shopping-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 450px;
            margin-top: 30px;
        }

        .shop-card {
            background: white;
            border-radius: 20px;
            padding: 10px;
            text-decoration: none;
            color: #000;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
            border: 2px solid transparent;
        }

        .shop-card:active { transform: scale(0.95); }

        /* ब्रांड कलर्स */
        .amz-card { border-color: #ff9900; }
        .flk-card { border-color: #2874f0; }
        .aji-card { border-color: #002e62; }
        .myn-card { border-color: #ff3f6c; }

        .brand-btn {
            width: 100%;
            padding: 8px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 14px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .amz-btn { background: #232f3e; color: #ff9900; }
        .flk-btn { background: #2874f0; color: #fff; }
        .aji-btn { background: #002e62; color: #fff; }
        .myn-btn { background: #ff3f6c; color: #fff; }

        .product-img {
            width: 90%;
            height: 100px;
            object-fit: contain;
            margin-bottom: 5px;
            border-radius: 10px;
        }

        .deal-tag {
            font-size: 13px;
            font-weight: bold;
            color: #d32f2f;
            background: #ffebee;
            padding: 2px 8px;
            border-radius: 5px;
        }

        /* सोशल बटन्स जो नीचे खिसक गए हैं */
        .social-section {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            width: 100%;
            max-width: 450px;
        }

        .social-btn {
            flex: 1;
            padding: 15px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .footer-area { margin-top: auto; padding: 30px 0; width: 100%; }
        .managed-line { font-size: 16px; font-weight: bold; margin-bottom: 8px; }
        .footer-links button { background: none; border: none; font-weight: bold; color: #000; cursor: pointer; text-decoration: underline; font-size: 16px; margin: 0 8px; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: #fff; margin: 10% auto; padding: 25px; border-radius: 20px; width: 90%; max-width: 500px; text-align: left; position: relative; max-height: 80vh; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="logo-box">
            <div class="logo-circle"><div class="logo-text">MG</div></div>
        </div>

        <div class="header-section">
            <h1><span class="m">M</span><span class="g">G</span> <span class="ai">AI</span> UPDATES</h1>
            <button class="share-btn" onclick="webShare()">share Website</button>
        </div>

        <div class="shopping-grid">
            <a href="https://www.amazon.in/?&tag=mukund148-21" class="shop-card amz-card">
                <div class="brand-btn amz-btn">AMAZON</div>
                <img src="https://m.media-amazon.com/images/I/61kFL7ywsZS._AC_UY218_.jpg" class="product-img">
                <span class="deal-tag">70% OFF Electronics</span>
            </a>

            <a href="https://fktr.in/8obn5pq" class="shop-card flk-card">
                <div class="brand-btn flk-btn">FLIPKART</div>
                <img src="https://m.media-amazon.com/images/I/71ZDY57yTQL._AC_UY218_.jpg" class="product-img">
                <span class="deal-tag">Best Budget Deals</span>
            </a>

            <a href="https://ajiio.in/9mZJ8qW" class="shop-card aji-card">
                <div class="brand-btn aji-btn">AJIO</div>
                <img src="https://www.pngall.com/wp-content/uploads/2/Sneakers-PNG-File.png" class="product-img">
                <span class="deal-tag">Branded Clothes</span>
            </a>

            <a href="https://myntr.it/Dsj3Mb7" class="shop-card myn-card">
                <div class="brand-btn myn-btn">MYNTRA</div>
                <img src="https://www.freeiconspng.com/thumbs/dress-png/frock-dress-png-15.png" class="product-img">
                <span class="deal-tag">Latest Fashion</span>
            </a>
        </div>

        <div class="social-section">
            <a href="https://www.youtube.com/@INDO148MG0.2" class="social-btn" style="background: #ff0000;">
                <i class="fab fa-youtube"></i> YouTube
            </a>
            <a href="https://t.me/Indo148mg" class="social-btn" style="background: #3399ff;">
                <i class="fab fa-telegram-plane"></i> Telegram
            </a>
        </div>

        <div class="footer-area">
            <div class="managed-line">© 2026 MG AI Updates | Managed by Mukund</div>
            <div class="footer-links">
                <button onclick="openModal('privacy')">Privacy Policy</button> | 
                <button onclick="openModal('terms')">Terms & Conditions</button> | 
                <button onclick="openModal('contact')">Contact Us</button>
            </div>
        </div>
    </div>

    <div id="infoModal" class="modal">
        <div class="modal-content">
            <span onclick="closeModal()" style="float:right; cursor:pointer; font-size:24px;">&times;</span>
            <h2 id="modalTitle" style="color:#28a745; margin-top:0;"></h2>
            <div id="modalBody" style="line-height:1.6; color:#333;"></div>
        </div>
    </div>

    <script>
        function webShare() {
            if (navigator.share) { navigator.share({ title: 'MG AI Updates', url: window.location.href }); }
            else { alert("Link: " + window.location.href); }
        }

        const data = {
            privacy: { 
                title: "Privacy Policy", 
                body: `<b>1. सूचना संग्रह:</b> हम अपने उपयोगकर्ताओं की किसी भी व्यक्तिगत जानकारी को इकट्ठा नहीं करते हैं।<br>
                       <b>2. कुकीज़:</b> बेहतर अनुभव के लिए कुकीज़ का उपयोग किया जा सकता है।<br>
                       <b>3. बाहरी लिंक्स:</b> हम Amazon और Flipkart के एफिलिएट लिंक्स का उपयोग करते हैं।` 
            },
            terms: { 
                title: "Terms & Conditions", 
                body: `<b>1. जिम्मेदारी:</b> हम उत्पादों की गुणवत्ता या डिलीवरी के लिए जिम्मेदार नहीं हैं। कृपया खरीदारी से पहले जांच करें।<br>
                       <b>2. एफिलिएट:</b> MG AI Updates एक एफिलिएट मार्केटिंग प्लेटफॉर्म है।<br>
                       <b>3. अधिकार:</b> इस वेबसाइट का डिजाइन मुकुंद गैन की संपत्ति है।` 
            },
            contact: { 
                title: "Contact Us", 
                body: `<b>संचालक:</b> मुकुंद गाईन (Mukund Gain)<br>
                       <b>ईमेल:</b> Mgaiupdates@gmail.com<br>
                       <b>स्थान:</b> रुद्रपुर, उत्तराखंड, भारत` 
            }
        };

        function openModal(type) {
            document.getElementById('modalTitle').innerText = data[type].title;
            document.getElementById('modalBody').innerHTML = data[type].body;
            document.getElementById('infoModal').style.display = "block";
        }
        function closeModal() { document.getElementById('infoModal').style.display = "none"; }
        window.onclick = function(event) { if (event.target == document.getElementById('infoModal')) { closeModal(); } }
    </script>
</body>
</html>
