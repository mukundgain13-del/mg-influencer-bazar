<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MG AI Updates</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; overflow-x: hidden; }
        body { 
            display: flex; 
            flex-direction: column; 
            font-family: 'Arial', sans-serif; 
            background: linear-gradient(to bottom, #ffcc33 0%, #33cccc 100%); 
            text-align: center; 
        }

        .container { flex: 1; padding: 10px; display: flex; flex-direction: column; align-items: center; }

        /* MG लोगो */
        .logo-circle {
            width: 100px; height: 100px; background: #000; border-radius: 50%;
            border: 3px solid #333; display: flex; justify-content: center;
            align-items: center; margin-top: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }
        .logo-text { font-size: 45px; font-weight: 900; color: #fff; letter-spacing: -2px; }

        /* टाइटल और शेयर बटन */
        .header-text { margin-top: 10px; }
        h1 { font-size: 28px; margin: 0; font-weight: 900; }
        .m { color: #ff0000; } .g { color: #008000; } .ai { color: #0080ff; }
        .share-link { color: #3399ff; font-size: 18px; font-weight: bold; text-decoration: underline; background: none; border: none; cursor: pointer; }

        /* बटन्स ग्रिड */
        .btn-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 10px; width: 100%; max-width: 400px; margin-top: 20px; 
        }
        .btn-item { text-decoration: none; color: #000; display: flex; flex-direction: column; align-items: center; }
        .circle { width: 85px; height: 85px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 35px; border: 3px solid #fff; }
        .pink-glow { background: #000; color: #ff0066; border-color: #ff0066; box-shadow: 0 0 15px #ff0066; } 
        .white-glow { background: #fff; color: #ff0000; box-shadow: 0 0 15px #fff; } 
        .blue-glow { background: #3399ff; color: #fff; box-shadow: 0 0 15px #3399ff; } 

        /* नया टेक्स्ट बॉक्स (जो आपने माँगा था) */
        .news-section {
            width: 90%; max-width: 380px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            padding: 15px;
            margin-top: 25px;
            border: 2px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: left;
        }
        .news-title { color: #ff0000; font-weight: 900; font-size: 18px; margin-bottom: 5px; display: block; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        .news-content { color: #333; font-size: 14px; font-weight: bold; line-height: 1.5; }

        /* फुटर और काउंटर */
        .footer-sec { margin-top: auto; padding-bottom: 15px; width: 100%; }
        .visitors-txt { color: #ff00ff; font-size: 22px; font-weight: 900; display: block; }
        .copy-txt { font-size: 12px; font-weight: bold; color: #d00; }
        .counter-img { height: 24px; margin-top: 8px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-circle"><div class="logo-text">MG</div></div>

        <div class="header-text">
            <h1><span class="m">MG</span> <span class="g">AI</span> <span class="ai">UPDATES</span></h1>
            <button class="share-link" onclick="shareMe()">share Website</button>
        </div>

        <div class="btn-grid">
            <a href="https://topdeal.app.link/niDWGq6PV1b" class="btn-item">
                <div class="circle pink-glow"><i class="fas fa-shopping-cart"></i></div>
                <div class="red-sub" style="font-size:11px; font-weight:bold; color:#d00;">Shoping Store</div>
            </a>
            <a href="https://www.youtube.com/@INDO148MG0.2" class="btn-item">
                <div class="circle white-glow"><i class="fab fa-youtube"></i></div>
                <div class="red-sub" style="font-size:11px; font-weight:bold; color:#d00;">Visit Channel</div>
            </a>
            <a href="https://t.me/Indo148mg" class="btn-item">
                <div class="circle blue-glow"><i class="fab fa-telegram-plane"></i></div>
                <div class="white-sub" style="font-size:11px; font-weight:bold; color:#fff;">Best Deals</div>
            </a>
        </div>

        <div class="news-section">
            <span class="news-title"><i class="fas fa-bullhorn"></i> ताज़ा अपडेट:</span>
            <div class="news-content">
                यहाँ आप अपनी कोई भी जानकारी लिख सकते हैं। जैसे: <br>
                1. Amazon पर आज सेल चल रही है! <br>
                2. YouTube चैनल पर नई वीडियो आ गई है। <br>
                3. बेस्ट डील्स के लिए टेलीग्राम ज्वाइन करें।
            </div>
        </div>

        <div class="footer-sec">
            <span class="visitors-txt">visitors</span>
            <div class="copy-txt">© 2026 MG AI Updates | Managed by Mukund</div>
            <img src="https://hitwebcounter.com/counter/counter.php?page=MG_MUKUND_NEW_ID_V2&style=0005&nbdigits=5&type=page&initCount=0" class="counter-img" alt="counter">
        </div>
    </div>

    <script>
        function shareMe() {
            if (navigator.share) {
                navigator.share({ title: 'MG AI Updates', url: window.location.href });
            } else {
                alert("Link: " + window.location.href);
            }
        }
    </script>
</body>
</html>
