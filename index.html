<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MG AI Updates</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* मोबाइल फुल स्क्रीन सेटिंग्स */
        html, body { height: 100%; margin: 0; padding: 0; overflow-x: hidden; }
        body { 
            display: flex; 
            flex-direction: column; 
            font-family: 'Arial', sans-serif; 
            background: linear-gradient(to bottom, #ffcc33 0%, #33cccc 100%); 
            text-align: center; 
            color: #000;
        }

        .container { flex: 1; padding: 15px; display: flex; flex-direction: column; align-items: center; }

        /* --- बड़ा MG लोगो --- */
        .logo-box { margin-top: 20px; }
        .logo-img { 
            width: 130px; /* और बड़ा किया */
            height: 130px; 
            border-radius: 50%; 
            border: 5px solid #333; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.4); 
            background: #fff;
            object-fit: contain;
        }

        /* नाम स्टाइल */
        h1 { font-size: 36px; margin: 20px 0; font-weight: 900; }
        .m { color: #ff0000; } .g { color: #008000; } .ai { color: #0000ff; }

        /* --- सुपर लार्ज बटन्स (एक ही पेज पर) --- */
        .button-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
            width: 100%;
            max-width: 600px; 
            margin: 30px auto; 
        }

        .nav-item { text-decoration: none; color: #000; display: flex; flex-direction: column; align-items: center; }

        .btn-circle { 
            width: 115px; /* बटन का साइज काफी बढ़ा दिया */
            height: 115px; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 55px; /* आइकॉन भी बड़े */
            margin-bottom: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border: 4px solid #fff;
        }

        .pink { background: #ff0066; color: #fff; } 
        .white { background: #fff; color: #ff0000; } 
        .blue { background: #3399ff; color: #fff; } 

        .btn-label { font-size: 16px; font-weight: bold; line-height: 1.2; }
        .btn-small { font-size: 12px; color: #111; }

        /* खबर बॉक्स */
        .news-section { 
            background: rgba(255,255,255,0.5); 
            margin: 25px auto; 
            padding: 15px; 
            width: 92%; 
            border-radius: 15px; 
            border: 2px solid #fff; 
            font-size: 18px;
            font-weight: bold;
        }

        .flex-spacer { flex: 1; }

        /* --- वर्किंग विज़िटर काउंटर --- */
        .footer-area { padding-bottom: 30px; width: 100%; }
        .counter-pill { 
            background: rgba(0,0,0,0.1); 
            padding: 12px 25px; 
            border-radius: 35px; 
            display: inline-block;
            font-size: 20px; 
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .counter-image { height: 32px; vertical-align: middle; margin-left: 10px; }
        
        footer { font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-box">
            <img src="https://i.postimg.cc/mD36p78S/MG-LOGO.png" class="logo-img" alt="MG Logo">
        </div>

        <h1><span class="m">M</span><span class="g">G</span> <span class="ai">AI</span> UPDATES</h1>

        <div class="button-grid">
            <a href="https://topdeal.app.link/niDWGq6PV1b" class="nav-item" target="_blank">
                <div class="btn-circle pink"><i class="fas fa-shopping-cart"></i></div>
                <div class="btn-label">All in one</div>
                <div class="btn-small">Store</div>
            </a>
            <a href="https://www.youtube.com/@INDO148MG0.2" class="nav-item" target="_blank">
                <div class="btn-circle white"><i class="fab fa-youtube"></i></div>
                <div class="btn-label">Visit Our</div>
                <div class="btn-small">Channel</div>
            </a>
            <a href="https://t.me/Indo148mg" class="nav-item" target="_blank">
                <div class="btn-circle blue"><i class="fab fa-telegram-plane"></i></div>
                <div class="btn-label">Join</div>
                <div class="btn-small">Telegram</div>
            </a>
        </div>

        <div class="news-section">
            <span style="color: #d00;">ताज़ा खबर:</span> <span>बड़े बटन्स और लोगो के साथ साइट अपडेट हो गई है!</span>
        </div>

        <div class="flex-spacer"></div>

        <div class="footer-area">
            <div class="counter-pill">
                🟢 VISITORS: 
                <img src="https://hitwebcounter.com/counter/counter.php?page=MGAI_RELOAD_OK&style=0005&nbdigits=5&type=page&initCount=0" class="counter-image" alt="visitor counter">
            </div>
            <footer>© 2026 MG AI Updates | Managed by Mukund</footer>
        </div>
    </div>

</body>
</html>
