<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MG AI Updates - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* मोबाइल के लिए फुल स्क्रीन और ग्रेडिएंट बैकग्राउंड */
        html, body { height: 100%; margin: 0; padding: 0; overflow-x: hidden; }
        body { 
            display: flex; 
            flex-direction: column; 
            font-family: 'Arial', sans-serif; 
            background: linear-gradient(to bottom, #ffcc33 0%, #33cccc 100%); 
            text-align: center; 
            color: #000;
        }

        .main-wrapper { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        /* --- यहाँ आपका नया और सुंदर MG लिखा लोगो है --- */
        .logo-box { margin-top: 20px; }
        .logo-img { 
            width: 120px; 
            height: 120px; 
            border-radius: 50%; 
            border: 4px solid #333; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); 
            background-color: #fff; /* लोगो को साफ़ दिखाने के लिए */
        }

        /* बड़ा और बोल्ड नाम */
        h1 { font-size: 34px; margin: 15px 0 10px; font-weight: 900; letter-spacing: 1px; }
        .m { color: #ff0000; } .g { color: #008000; } .ai { color: #0000ff; }

        /* बड़े गोल बटन्स का ग्रिड (Grid) - जो मोबाइल पर और चौड़ा दिखेगा */
        .icon-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 12px; 
            width: 100%;
            max-width: 550px; 
            margin: 30px auto; 
            padding: 0 5px;
        }

        .icon-item { text-decoration: none; color: #000; display: flex; flex-direction: column; align-items: center; }

        /* --- बटन्स का नया, सुपर लार्ज साइज (115px) --- */
        .circle-btn { 
            width: 110px; height: 110px; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 50px; /* आइकॉन का साइज भी बढ़ा दिया */
            margin-bottom: 10px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.3);
            border: 4px solid #fff;
            transition: 0.2s;
        }

        /* बटन्स के रंग */
        .bg-pink { background: #ff0066; color: #fff; } /* Shopping */
        .bg-white { background: #fff; color: #ff0000; } /* YouTube */
        .bg-blue { background: #3399ff; color: #fff; } /* Telegram */

        /* टेक्स्ट और सब-टेक्स्ट - बड़े साइज के लिए सुधार */
        .btn-text { font-size: 16px; font-weight: bold; line-height: 1.2; width: 115px; } /* टेक्स्ट थोड़ा बड़ा और चौड़ा */
        .btn-sub { font-size: 12px; color: #111; font-weight: bold; margin-top: 3px; } /* सब-टेक्स्ट */

        .icon-item:hover .circle-btn { transform: scale(1.03); } /* क्लिक करने पर हल्का सा बड़ा होगा */

        /* ताज़ा खबर सेक्शन - बड़ा साइज */
        .news-box { 
            background: rgba(255,255,255,0.4); 
            margin: 20px auto; 
            padding: 15px; 
            width: 90%; 
            border-radius: 12px; 
            border: 2px solid #fff; 
            font-size: 18px;
            font-weight: bold;
        }

        .spacer { flex: 1; }

        /* फुटर और विज़िटर काउंटर एकदम नीचे */
        .bottom-section { padding-bottom: 40px; width: 100%; }
        .visitor-box { 
            margin-bottom: 20px; 
            background: rgba(0,0,0,0.1); 
            padding: 10px 20px; 
            border-radius: 30px; 
            display: inline-block;
            font-size: 20px; 
            font-weight: 900;
        }
        
        .counter-img { height: 30px; vertical-align: middle; margin-left: 8px; }
        
        footer { font-size: 15px; font-weight: bold; color: #000; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="logo-box">
            <img src="https://i.ibb.co/5xbkC3M/MGAILogo.png" class="logo-img" alt="MG AI Updates Logo">
        </div>

        <h1><span class="m">M</span><span class="g">G</span> <span class="ai">AI</span> UPDATES</h1>

        <div class="icon-grid">
            <a href="https://topdeal.app.link/niDWGq6PV1b" class="icon-item" target="_blank">
                <div class="circle-btn bg-pink"><i class="fas fa-shopping-cart"></i></div>
                <div class="btn-text">All in one</div>
                <div class="btn-sub">Store</div>
            </a>
            <a href="https://www.youtube.com/@INDO148MG0.2" class="icon-item" target="_blank">
                <div class="circle-btn bg-white"><i class="fab fa-youtube"></i></div>
                <div class="btn-text">Visit Our</div>
                <div class="btn-sub">Channel</div>
            </a>
            <a href="https://t.me/Indo148mg" class="icon-item" target="_blank">
                <div class="circle-btn bg-blue"><i class="fab fa-telegram-plane"></i></div>
                <div class="btn-text">Join</div>
                <div class="btn-sub">Telegram</div>
            </a>
        </div>

        <div class="news-box">
            <span style="color: #d00;">ताज़ा खबर:</span> <span>वेबसाइट अब सुपर बड़े बटन्स और लोगो के साथ तैयार है!</span>
        </div>

        <div class="spacer"></div>

        <div class="bottom-section">
            <div class="visitor-box">
                🟢 VISITORS: 
                <img src="https://hitwebcounter.com/counter/counter.php?page=MGAI_SUPER_BIG_V1&style=0005&nbdigits=5&type=page&initCount=0" class="counter-img" alt="counter">
            </div>

            <footer>
                © 2026 MG AI Updates | Managed by Mukund
            </footer>
        </div>
    </div>

</body>
</html>
