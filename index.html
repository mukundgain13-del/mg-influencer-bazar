<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MG Influencer Bazar</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; padding: 20px; }
        .header { background: #007bff; color: white; padding: 20px; border-radius: 10px; }
        .btn-group { margin-top: 30px; display: flex; flex-direction: column; gap: 15px; }
        .btn { padding: 15px; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; color: white; text-decoration: none; display: block; width: 100%; max-width: 300px; margin: 0 auto; }
        .yt { background: #FF0000; }
        .insta { background: #E1306C; }
        .fb { background: #1877F2; }
        h2 { color: #333; }
    </style>
</head>
<body>
    <div class="header">
        <h1>MG Influencer Bazar</h1>
        <p>क्रिएटर्स की अपनी दुनिया</p>
    </div>
    <h2>रजिस्ट्रेशन शुरू करें:</h2>
    <div class="btn-group">
        <button class="btn yt">🎥 YouTube</button>
        <button class="btn insta">📸 Instagram</button>
        <button class="btn fb">👥 Facebook</button>
    </div>
    <p style="margin-top: 50px; color: grey;">© 2026 MG Influencer Bazar</p>
</body>
</html>
