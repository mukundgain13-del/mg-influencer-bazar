<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MG AI Updates - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; margin: 0; padding: 0; overflow-x: hidden;
            display: flex; flex-direction: column;
            background: linear-gradient(to bottom, #ffcc33 0%, #33cccc 100%); 
            font-family: 'Arial', sans-serif; text-align: center; color: #000;
        }

        /* डेस्कटॉप मोड में इसे छोटा होने से बचाने के लिए चौड़ाई बढ़ाई गई है */
        .main-container { 
            flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; 
            width: 100%; max-width: 850px; 
            margin: 0 auto; 
        }

        .logo-box { margin-top: 20px; }
        .logo-circle {
            width: 125px; height: 125px; background: #000; border-radius: 50%;
            border: 5px solid #777; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        .logo-text { color: #fff; font-size: 55px; font-weight: 900; letter-spacing: -2px; }

        .header-section h1 { font-size: 42px; margin: 20px 0 0 0; font-weight: 900; }
        .m { color: #ff0000; } .g { color: #008000; } .ai { color: #0000ff; }
        .share-btn { color: #0066cc; font-size: 24px; font-weight: bold; text-decoration: underline; background: none; border: none; cursor: pointer; }

        .btn-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; 
            width: 100%; max-width: 580px; margin-top: 40px; 
        }
        .grid-item { text-decoration: none; color: #000; display: flex; flex-direction: column; align-items: center; }
        .btn-round { width: 115px; height: 115px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 55px; border: 4px solid #fff; box-shadow: 0 6px 15px rgba(0,0,0,0.3); }
        
        .pink-bg { background: #000; color: #ff0066; border-color: #ff0066; box-shadow: 0 0 20px #ff0066; } 
        .white-bg { background: #fff; color: #ff0000; } 
        .blue-bg { background: #3399ff; color: #fff; } 
        
        .lbl-main { font-size: 19px; font-weight: 900; margin-top: 12px; line-height: 1.1; }
        .lbl-sub { font-size: 14px; font-weight: bold; color: #333; }

        .promo-box {
            width: 95%; max-width: 650px; background: #fff; border-radius: 30px;
            padding: 12px; margin-top: 45px; border: 6px solid #eee; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }
        .promo-img-full { width: 100%; border-radius: 25px; display: block; }

        .footer-area { margin-top: auto; padding: 30px 0; width: 100%; }
        .managed-line { font-size: 16px; font-weight: bold; margin-bottom: 8px; }
        .footer-links button { background: none; border: none; font-weight: bold; color: #000; cursor: pointer; text-decoration: underline; font-size: 16px; margin: 0 8px; }

        /* पॉप-अप डिज़ाइन */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: #fff; margin: 10% auto; padding: 25px; border-radius: 20px; width: 90%; max-width: 500px; text-align: left; position: relative; max-height: 80vh; overflow-y: auto; }

        /* मोबाइल के लिए ऑटो-बैलेंस */
        @media (max-width: 600px) {
            .logo-circle { width: 100px; height: 100px; }
            .btn-round { width: 90px; height: 90px; font-size: 45px; }
            .header-section h1 { font-size: 32px; }
            .promo-box { width: 98%; }
            .lbl-main { font-size: 16px; }
        }
    </style>
</head>
