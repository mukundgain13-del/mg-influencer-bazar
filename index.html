<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MG AI Updates</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; overflow-x: hidden; }
        body { 
            display: flex; flex-direction: column; 
            font-family: 'Arial', sans-serif; 
            background: linear-gradient(to bottom, #ffcc33 0%, #33cccc 100%); 
            text-align: center; color: #000;
        }

        .container { flex: 1; padding: 15px; display: flex; flex-direction: column; align-items: center; }

        /* लोगो सेक्शन */
        .logo-circle {
            width: 100px; height: 100px; background: #000; border-radius: 50%;
            border: 3px solid #333; display: flex; justify-content: center;
            align-items: center; margin-top: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .logo-text { font-size: 45px; font-weight: 900; color: #fff; letter-spacing: -2px; }

        /* हेडर और शेयर */
        .header-section h1 { font-size: 32px; margin: 10px 0 0 0; font-weight: 900; }
        .m { color: #ff0000; } .g { color: #008000; } .ai { color: #0000ff; }
        .share-btn { 
            color: #0066cc; font-size: 20px; font-weight: bold; 
            text-decoration: underline; background: none; border: none; cursor: pointer;
        }

        /* बटन्स ग्रिड - फोटो के टेक्स्ट के साथ */
        .grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 10px; width: 100%; max-width: 450px; margin-top: 30px; 
        }
        .item { text-decoration: none; color: #000; display: flex; flex-direction: column; align-items: center; }
        .circle { 
            width: 90px; height: 90px; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 40px; border: 4px solid #fff; 
        }
        .pink-bg { background: #ff0066; color: #fff; box-shadow: 0 0 12px #ff0066; } 
        .white-bg { background: #fff; color: #ff0000; box-shadow: 0 0 12px rgba(255,255,255,0.8); } 
        .blue-bg { background: #3399ff; color: #fff; box-shadow: 0 0 12px #3399ff; } 
        
        .label-main { font-size: 13px; font-weight: 900; margin-top: 8px; line-height: 1; }
        .label-sub { font-size: 11px; font-weight: bold; color: #d00; }

        /* ताज़ा खबर बॉक्स */
        .news-card {
            width: 90%; max-width: 380px; background: rgba(255, 255, 255, 0.7);
            border-radius: 12px; padding: 12px; margin-top: 30px;
            border: 2px solid #fff; text-align: left;
        }
        .news-card h3 { color: #ff0000; margin: 0 0 5px 0; font-size: 16px; }
        .news-card p { font-size: 13px; font-weight: bold; margin: 0; color: #333; }

        /* फुटर - विज़िटर हटा दिया गया है */
        .footer { margin-top: auto; padding: 25px 0; width: 100%; }
        .copy { font-size: 14px; font-weight: bold; color: #000; margin-bottom: 8px; }
        .footer-links { font-size: 12px; font-weight: bold; }
        .footer-links a { color: #000; text-decoration: none; margin: 0 5px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-circle"><div class="logo-text">MG</div></div>

        <div class="header-section">
            <h1><span class="m">MG</span> <span class="g">AI</span> <span class="ai">UPDATES</span></h1>
            <button class="share-btn" onclick="webShare()">share Website</button>
        </div>

        <div class="grid">
            <a href="https://topdeal.app.link/niDWGq6PV1b" class="item">
                <div class="circle pink-bg"><i class="fas fa-shopping-cart"></i></div>
                <div class="label-main">All in one</div>
                <div class="label-sub">Shoping Store</div>
            </a>
            <a href="https://www.youtube.com/@INDO148MG0.2" class="item">
                <div class="circle white-bg"><i class="fab fa-youtube"></i></div>
                <div class="label-main">Visit Our Channel</div>
            </a>
            <a href="https://t.me/Indo148mg" class="item">
                <div class="circle blue-bg"><i class="fab fa-telegram-plane"></i></div>
                <div class="label-main">Join Telegram</div>
                <div class="label-sub" style="color:#fff">Best Deals</div>
            </a>
        </div>

        <div class="news-card">
            <h3><i class="fas fa-bullhorn"></i> ताज़ा अपडेट:</h3>
            <p>• वेबसाइट अब और भी प्रोफेशनल हो गई है!</p>
        </div>

        <div class="footer">
            <div class="copy">© 2026 MG AI Updates | Managed by Mukund</div>
            <div class="footer-links">
                <a href="#">Privacy Policy</a> | 
                <a href="#">Terms & Conditions</a> | 
                <a href="#">Contact Us</a>
            </div>
        </div>
    </div>

    <script>
        function webShare() {
            if (navigator.share) {
                navigator.share({ title: 'MG AI Updates', url: window.location.href });
            } else {
                alert("Link: " + window.location.href);
            }
        }
    </script>
</body>
</html>
