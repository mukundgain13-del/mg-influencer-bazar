<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MG AI Updates</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* मोबाइल फुल स्क्रीन सेटिंग्स */
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; overflow-x: hidden; }
        body { 
            display: flex; 
            flex-direction: column; 
            font-family: 'Arial', sans-serif; 
            background: linear-gradient(to bottom, #ffcc33 0%, #33cccc 100%); 
            text-align: center; 
        }

        .main-container { flex: 1; padding: 20px 10px; display: flex; flex-direction: column; align-items: center; }

        /* --- MG लोगो (हमेशा दिखने वाला) --- */
        .logo-div { margin-top: 10px; }
        .logo-img { 
            width: 120px; height: 120px; 
            border-radius: 50%; 
            border: 4px solid #000; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            background: #fff;
        }

        /* नाम (M लाल, G हरा, AI नीला) */
        h1 { font-size: 36px; margin: 15px 0; font-weight: 900; letter-spacing: 1px; }
        .red { color: #ff0000; } .green { color: #008000; } .blue { color: #0000ff; }

        /* --- सबसे बड़े बटन्स का ग्रिड --- */
        .btn-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 8px; 
            width: 100%; 
            max-width: 600px; 
            margin: 25px 0; 
        }

        .btn-link { text-decoration: none; color: #000; display: flex; flex-direction: column; align-items: center; }

        /* बटन का सुपर साइज (120px+) */
        .circle { 
            width: 110px; height: 110px; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 50px; 
            margin-bottom: 8px;
            border: 4px solid #fff;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .pink-bg { background: #ff0066; color: #fff; } 
        .white-bg { background: #fff; color: #ff0000; } 
        .blue-bg { background: #3399ff; color: #fff; } 

        .btn-txt { font-size: 15px; font-weight: bold; line-height: 1.2; }

        /* ताज़ा खबर - बड़ा बॉक्स */
        .news-box { 
            background: rgba(255,255,255,0.4); 
            margin: 15px 0; 
            padding: 15px; 
            width: 95%; 
            border-radius: 12px; 
            border: 2px solid #fff; 
            font-size: 18px; font-weight: bold;
        }

        .spacer { flex: 1; }

        /* --- वर्किंग विज़िटर काउंटर --- */
        .bottom-bar { padding-bottom: 30px; width: 100%; }
        .counter { 
            background: rgba(0,0,0,0.1); 
            padding: 10px 20px; 
            border-radius: 30px; 
            display: inline-block;
            font-size: 20px; font-weight: 900;
            margin-bottom: 10px;
        }
        
        footer { font-size: 14px; font-weight: bold; color: #000; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="logo-div">
            <img src="https://ui-avatars.com/api/?name=MG&background=000&color=fff&rounded=true&size=150" class="logo-img" alt="MG Logo">
        </div>

        <h1><span class="red">M</span><span class="green">G</span> <span class="blue">AI</span> UPDATES</h1>

        <div class="btn-grid">
            <a href="https://topdeal.app.link/niDWGq6PV1b" class="btn-link" target="_blank">
                <div class="circle pink-bg"><i class="fas fa-shopping-cart"></i></div>
                <div class="btn-txt">All in one</div>
            </a>
            <a href="https://www.youtube.com/@INDO148MG0.2" class="btn-link" target="_blank">
                <div class="circle white-bg"><i class="fab fa-youtube"></i></div>
                <div class="btn-txt">Visit Our Channel</div>
            </a>
            <a href="https://t.me/Indo148mg" class="btn-link" target="_blank">
                <div class="circle blue-bg"><i class="fab fa-telegram-plane"></i></div>
                <div class="btn-txt">Join Telegram</div>
            </a>
        </div>

        <div class="news-box">
            <span style="color: #d00;">ताज़ा खबर:</span> <span>साइट अब बड़े बटन्स और वर्किंग लोगो के साथ अपडेट हो गई है!</span>
        </div>

        <div class="spacer"></div>

        <div class="bottom-bar">
            <div class="counter">
                🟢 VISITORS: 
                <img src="https://hitwebcounter.com/counter/counter.php?page=MGAI_RELOAD_FIXED&style=0005&nbdigits=5&type=page&initCount=0" style="height: 30px; vertical-align: middle;" alt="counter">
            </div>
            <footer>© 2026 MG AI Updates | Managed by Mukund</footer>
        </div>
    </div>

</body>
</html>
