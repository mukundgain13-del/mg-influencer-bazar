<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MG AI Updates - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* मोबाइल फुल स्क्रीन और बैकग्राउंड (Yellow to Cyan Gradient) */
        html, body { height: 100%; margin: 0; padding: 0; overflow-x: hidden; }
        body { 
            display: flex; 
            flex-direction: column; 
            font-family: 'Arial', sans-serif; 
            background: linear-gradient(to bottom, #ffcc33 0%, #33cccc 100%); 
            text-align: center; 
            color: #000;
        }

        .wrapper { flex: 1; display: flex; flex-direction: column; padding: 10px; align-items: center; }

        /* लोगो सेक्शन - नए और चमकदार लोगो के साथ */
        .logo-box { margin-top: 15px; }
        
        /* --- यहाँ आपका नया और सुंदर MG लोगो लिंक है --- */
        .logo-img { 
            width: 100px; 
            height: 100px; 
            border-radius: 50%; 
            border: 4px solid #333; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
            background-color: #fff; /* ताकि लोगो साफ़ दिखे */
        }

        /* बड़ा और रंगीन नाम */
        h1 { font-size: 32px; margin: 15px 0; font-weight: 900; letter-spacing: 1px; }
        .m { color: #ff0000; } .g { color: #008000; } .ai { color: #0000ff; }

        /* तीनों बटन्स का ग्रिड - जो पूरी स्क्रीन में फैल जाएगा */
        .icon-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 5px; 
            width: 100%; /* पूरी चौड़ाई */
            max-width: 600px; 
            margin: 25px auto; 
            padding: 0 5px;
        }

        .icon-item { text-decoration: none; color: #000; display: flex; flex-direction: column; align-items: center; }

        /* बटन्स का साइज (स्क्रीन के हिसाब से एकदम सही) */
        .circle-btn { 
            width: 100px; height: 100px; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 45px; 
            margin-bottom: 8px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.25);
            border: 3px solid #fff;
            transition: 0.2s;
        }

        /* बटन्स के रंग */
        .bg-pink { background: #ff0066; color: #fff; } 
        .bg-white { background: #fff; color: #ff0000; } 
        .bg-blue { background: #3399ff; color: #fff; } 

        /* टेक्स्ट सेटिंग्स */
        .btn-text { font-size: 14px; font-weight: bold; line-height: 1.2; }
        .btn-sub { font-size: 11px; color: #111; font-weight: bold; }

        /* ताज़ा खबर बॉक्स */
        .news-box { 
            background: rgba(255,255,255,0.4); 
            margin: 20px auto; 
            padding: 15px; 
            width: 90%; 
            border-radius: 12px; 
            border: 2px solid #fff; 
            font-size: 16px;
            font-weight: bold;
        }

        .spacer { flex: 1; }

        /* विज़िटर काउंटर - जो हर बार रिफ्रेश करने पर बढ़ेगा */
        .bottom-section { padding-bottom: 30px; width: 100%; }
        .visitor-box { 
            margin-bottom: 15px; 
            background: rgba(0,0,0,0.1); 
            padding: 8px 15px; 
            border-radius: 30px; 
            display: inline-block;
            font-size: 18px; 
            font-weight: 900;
        }
        
        .counter-img { height: 25px; vertical-align: middle; margin-left: 5px; }
        
        footer { font-size: 14px; font-weight: bold; color: #000; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="logo-box">
            <img src="https://i.ibb.co/30hFp2K/MGAILogo.png" class="logo-img" alt="MG AI Updates Logo">
        </div>

        <h1><span class="m">M</span><span class="g">G</span> <span class="ai">AI</span> UPDATES</h1>

        <div class="icon-grid">
            <a href="https://topdeal.app.link/niDWGq6PV1b" class="icon-item" target="_blank">
                <div class="circle-btn bg-pink"><i class="fas fa-shopping-cart"></i></div>
                <div class="btn-text">All in one</div>
                <div class="btn-sub">Store</div>
            </a>
            <a href="https://www.youtube.com/@INDO148MG0.2" class="icon-item" target="_blank">
                <div class="circle-btn bg-white"><i class="fab fa-youtube"></i></div>
                <div class="btn-text">Visit Our</div>
                <div class="btn-sub">Channel</div>
            </a>
            <a href="https://t.me/Indo148mg" class="icon-item" target="_blank">
                <div class="circle-btn bg-blue"><i class="fab fa-telegram-plane"></i></div>
                <div class="btn-text">Join</div>
                <div class="btn-sub">Telegram</div>
            </a>
        </div>

        <div class="news-box">
            <span style="color: #d00;">ताज़ा खबर:</span> <span>अब वेबसाइट पर असली "MG" लोगो लगा दिया गया है!</span>
        </div>

        <div class="spacer"></div>

        <div class="bottom-section">
            <div class="visitor-box">
                🟢 VISITORS: 
                <img src="https://hitwebcounter.com/counter/counter.php?page=MGAI_FINAL_LOGO_V1&style=0005&nbdigits=5&type=page&initCount=0" class="counter-img" alt="counter">
            </div>

            <footer>
                © 2026 MG AI Updates | Managed by Mukund
            </footer>
        </div>
    </div>

</body>
</html>
