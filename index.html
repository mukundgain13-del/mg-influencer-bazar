<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MG AI Updates</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; overflow-x: hidden; }
        body { 
            display: flex; 
            flex-direction: column; 
            font-family: 'Arial', sans-serif; 
            background: linear-gradient(to bottom, #ffcc33 0%, #33cccc 100%); 
            text-align: center; 
        }

        .container { flex: 1; padding: 10px; display: flex; flex-direction: column; align-items: center; }

        /* फोटो वाला MG लोगो */
        .logo-img { 
            width: 130px; height: 130px; 
            border-radius: 50%; 
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* MG AI UPDATES share Website */
        .title-sec { margin-top: 10px; }
        h1 { font-size: 32px; margin: 0; font-weight: 900; }
        .m { color: #ff0000; } .g { color: #008000; } .ai { color: #0000ff; }
        .share-web { color: #0066cc; font-size: 22px; font-weight: bold; margin-top: -5px; display: block; }

        /* बटन्स ग्रिड */
        .btn-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 5px; 
            width: 100%; 
            margin: 30px 0; 
        }

        .btn-item { text-decoration: none; color: #000; display: flex; flex-direction: column; align-items: center; }

        /* ग्लोइंग बटन्स जैसा फोटो में है */
        .circle { 
            width: 105px; height: 105px; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 45px; 
            margin-bottom: 5px;
            border: 3px solid #fff;
            box-shadow: 0 0 15px rgba(255,255,255,0.8);
        }

        .pink-btn { background: #ff0066; color: #fff; box-shadow: 0 0 20px #ff0066; } 
        .white-btn { background: #fff; color: #ff0000; box-shadow: 0 0 15px #fff; } 
        .blue-btn { background: #3399ff; color: #fff; box-shadow: 0 0 20px #3399ff; } 

        /* टेक्स्ट जैसा आपने बताया */
        .main-txt { font-size: 18px; font-weight: 900; margin-top: 5px; }
        .sub-txt { font-size: 11px; font-weight: bold; color: #333; }

        .spacer { flex: 1; }

        /* विज़िटर और फुटर */
        .footer-area { padding-bottom: 25px; width: 100%; }
        .visitors { color: #ff00ff; font-size: 26px; font-weight: 900; margin-bottom: 10px; display: block; }
        
        .footer-info { font-size: 15px; font-weight: bold; color: #d00; line-height: 1.6; }
        .footer-links a { color: #000; text-decoration: none; margin: 0 5px; }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://i.ibb.co/5xbkC3M/MGAILogo.png" class="logo-img" alt="MG Logo">

        <div class="title-sec">
            <h1><span class="m">M</span><span class="g">G</span> <span class="ai">AI</span> UPDATES</h1>
            <span class="share-web">share Website</span>
        </div>

        <div class="btn-grid">
            <a href="https://topdeal.app.link/niDWGq6PV1b" class="btn-item">
                <div class="circle pink-btn"><i class="fas fa-shopping-cart"></i></div>
                <div class="main-txt">All in one</div>
                <div class="sub-txt">Shoping Store</div>
            </a>
            <a href="https://www.youtube.com/@INDO148MG0.2" class="btn-item">
                <div class="circle white-btn"><i class="fab fa-youtube"></i></div>
                <div class="main-txt">Visit Our Channel</div>
            </a>
            <a href="https://t.me/Indo148mg" class="btn-item">
                <div class="circle blue-btn"><i class="fab fa-telegram-plane"></i></div>
                <div class="main-txt">Join Telegram</div>
                <div class="sub-txt">Best Deals</div>
            </a>
        </div>

        <div class="spacer"></div>

        <div class="footer-area">
            <span class="visitors">visitors</span>
            
            <div class="footer-info">
                © 2026 MG AI Updates | Managed by Mukund<br>
                <div class="footer-links">
                    <a href="#">privacy policy</a> | <a href="#">contact us</a>
                </div>
            </div>
            
            <img src="https://hitwebcounter.com/counter/counter.php?page=MGAI_PHOTO_FINAL&style=0005&nbdigits=5&type=page&initCount=0" style="height: 25px; margin-top: 10px;" alt="counter">
        </div>
    </div>

</body>
</html>
