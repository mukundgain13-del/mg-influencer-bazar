<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MG AI Updates - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; overflow-x: hidden; }
        body { 
            display: flex; flex-direction: column; 
            font-family: 'Arial', sans-serif; 
            background: linear-gradient(to bottom, #ffcc33 0%, #33cccc 100%); 
            text-align: center; color: #000;
        }

        .main-container { flex: 1; padding: 15px; display: flex; flex-direction: column; align-items: center; }

        /* लोगो */
        .logo-box { margin-top: 15px; }
        .logo-circle {
            width: 100px; height: 100px; background: #000; border-radius: 50%;
            border: 3px solid #333; display: flex; justify-content: center; align-items: center;
        }
        .logo-img-main { width: 85px; height: 85px; border-radius: 50%; object-fit: contain; }

        .header-section h1 { font-size: 32px; margin: 15px 0 0 0; font-weight: 900; }
        .m { color: #ff0000; } .g { color: #008000; } .ai { color: #0000ff; }
        .share-btn { color: #0066cc; font-size: 20px; font-weight: bold; text-decoration: underline; background: none; border: none; }

        /* बटन्स */
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 450px; margin-top: 25px; }
        .grid-item { text-decoration: none; color: #000; display: flex; flex-direction: column; align-items: center; }
        .btn-round { width: 85px; height: 85px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 40px; border: 3px solid #fff; }
        .pink-bg { background: #000; color: #ff0066; border-color: #ff0066; } 
        .white-bg { background: #fff; color: #ff0000; } 
        .blue-bg { background: #3399ff; color: #fff; } 
        .lbl-main { font-size: 12px; font-weight: 900; margin-top: 8px; }

        /* प्रोमो बॉक्स - फिक्स्ड डिजाइन */
        .promo-box {
            width: 100%; max-width: 480px; background: #fff; border-radius: 20px;
            padding: 20px; margin-top: 35px; border: 5px solid #fff; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); display: flex; align-items: flex-start; text-align: left;
        }
        .promo-img-container { width: 40%; }
        /* यहाँ केवल आपकी फोटो आएगी, पूरा बैनर नहीं */
        .promo-img { width: 100%; border-radius: 12px; object-fit: cover; }
        
        .promo-text { width: 60%; padding-left: 15px; }
        .earn-btn-label { 
            background: #28a745; color: #fff; border-radius: 6px; 
            font-size: 14px; font-weight: bold; padding: 10px; 
            margin-bottom: 10px; text-align: center; box-shadow: 0 4px 0 #1e7e34;
        }
        .earn-list { font-size: 12px; font-weight: bold; color: #333; margin: 0; padding-left: 15px; line-height: 1.4; }

        /* फुटर */
        .footer-area { margin-top: auto; padding: 25px 0; width: 100%; }
        .footer-links button { background: none; border: none; font-weight: bold; cursor: pointer; text-decoration: underline; }

        /* मॉडल्स */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
        .modal-content { background: #fff; margin: 20% auto; padding: 20px; border-radius: 15px; width: 85%; max-width: 400px; position: relative; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="logo-box">
            <div class="logo-circle">
                <img src="https://i.ibb.co/LdM500Gj/1774937203833.png" class="logo-img-main" alt="MG Logo">
            </div>
        </div>

        <div class="header-section">
            <h1><span class="m">M</span><span class="g">G</span> <span class="ai">AI</span> UPDATES</h1>
            <button class="share-btn" onclick="webShare()">share Website</button>
        </div>

        <div class="btn-grid">
            <a href="https://topdeal.app.link/niDWGq6PV1b" class="grid-item">
                <div class="btn-round pink-bg"><i class="fas fa-shopping-cart"></i></div>
                <div class="lbl-main">All in one</div>
            </a>
            <a href="https://www.youtube.com/@INDO148MG0.2" class="grid-item">
                <div class="btn-round white-bg"><i class="fab fa-youtube"></i></div>
                <div class="lbl-main">Visit Our Channel</div>
            </a>
            <a href="https://t.me/Indo148mg" class="grid-item">
                <div class="btn-round blue-bg"><i class="fab fa-telegram-plane"></i></div>
                <div class="lbl-main">Join Telegram</div>
            </a>
        </div>

        <div class="promo-box">
            <div class="promo-img-container">
                <img src="https://i.ibb.co/LdM500Gj/1774937203833.png" class="promo-img" alt="Mukund">
            </div>
            <div class="promo-text">
                <div class="earn-btn-label">SHOP TO EARN PART-TIME!</div>
                <ul class="earn-list">
                    <li>Create Your Account</li>
                    <li>Refer Products</li>
                    <li>Earn commission!</li>
                    <li>Work from Home!</li>
                </ul>
            </div>
        </div>

        <div class="footer-area">
            <div class="managed-line">© 2026 MG AI Updates | Managed by Mukund</div>
            <div class="footer-links">
                <button onclick="openModal('privacy')">Privacy Policy</button> | 
                <button onclick="openModal('terms')">Terms & Conditions</button> | 
                <button onclick="openModal('contact')">Contact Us</button>
            </div>
        </div>
    </div>

    <div id="infoModal" class="modal">
        <div class="modal-content">
            <span onclick="closeModal()" style="float:right; cursor:pointer;">&times;</span>
            <h2 id="modalTitle"></h2>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        function webShare() {
            if (navigator.share) { navigator.share({ title: 'MG AI Updates', url: window.location.href }); }
            else { alert("Link: " + window.location.href); }
        }

        const data = {
            privacy: { title: "Privacy Policy", body: "आपका डेटा सुरक्षित है।" },
            terms: { title: "Terms & Conditions", body: "वेबसाइट के नियम यहाँ दिए गए हैं।" },
            contact: { title: "Contact Us", body: "Mukund Gain - Rudrapur, Uttarakhand" }
        };

        function openModal(type) {
            document.getElementById('modalTitle').innerText = data[type].title;
            document.getElementById('modalBody').innerHTML = data[type].body;
            document.getElementById('infoModal').style.display = "block";
        }

        function closeModal() { document.getElementById('infoModal').style.display = "none"; }
    </script>
</body>
</html>
