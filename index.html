<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MG AI Updates - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* मोबाइल फुल स्क्रीन सेटिंग्स और ग्रेडिएंट बैकग्राउंड */
        html, body { height: 100%; margin: 0; padding: 0; overflow-x: hidden; }
        body { 
            display: flex; 
            flex-direction: column; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(to bottom, #ffcc33 0%, #33cccc 100%); 
            text-align: center; 
            color: #000;
        }

        .main-wrapper { flex: 1; padding: 15px; display: flex; flex-direction: column; align-items: center; }

        /* --- बड़ा और साफ़ MG लोगो (image_9.png के लिए सुधार) --- */
        .logo-box { margin-top: 20px; }
        .logo-img { 
            width: 120px; 
            height: 120px; 
            border-radius: 50%; 
            border: 4px solid #333; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); 
            background-color: #fff; /* लोगो को साफ़ दिखाने के लिए */
            object-fit: contain; /* सुनिश्चित करता है कि इमेज सही से दिखे */
        }

        /* बड़ा और बोल्ड नाम */
        h1 { font-size: 32px; margin: 20px 0; font-weight: 900; letter-spacing: 1px; text-shadow: 1px 1px 2px rgba(255,255,255,0.5); }
        .m { color: #ff0000; } .g { color: #008000; } .ai { color: #0000ff; }

        /* बटन्स का ग्रिड - मोबाइल पर सुपर लार्ज दिखेगा */
        .icon-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 12px; 
            width: 100%;
            max-width: 500px; 
            margin: 30px auto; 
        }

        .icon-item { text-decoration: none; color: #000; display: flex; flex-direction: column; align-items: center; }

        /* --- बटन्स का नया, सुपर लार्ज साइज (105px) --- */
        .circle-btn { 
            width: 105px; height: 105px; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 45px; /* आइकॉन का साइज भी बढ़ा दिया */
            margin-bottom: 10px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.25);
            border: 4px solid #fff;
            transition: 0.3s;
        }

        /* बटन्स के रंग */
        .bg-pink { background: #ff0066; color: #fff; } 
        .bg-white { background: #fff; color: #ff0000; } 
        .bg-blue { background: #3399ff; color: #fff; } 

        /* टेक्स्ट - अब साफ़ और बड़ा दिखेगा */
        .btn-text { font-size: 16px; font-weight: bold; line-height: 1.2; width: 110px; }
        .btn-sub { font-size: 12px; color: #111; font-weight: bold; margin-top: 3px; }

        /* बड़ी ताज़ा खबर बॉक्स */
        .news-box { 
            background: rgba(255,255,255,0.5); 
            margin: 25px auto; 
            padding: 20px; 
            width: 92%; 
            max-width: 600px; 
            border-radius: 15px; 
            border: 2px solid rgba(255,255,255,0.8); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            font-size: 18px;
            font-weight: bold;
        }

        .spacer { flex: 1; }

        /* --- विज़िटर काउंटर - जो हर बार रिफ्रेश करने पर बढ़ेगा --- */
        .bottom-section { padding-bottom: 30px; }
        .visitor-box { margin-bottom: 15px; font-weight: bold; font-size: 20px; background: rgba(0,0,0,0.08); display: inline-block; padding: 10px 20px; border-radius: 30px; }
        
        .counter-img { height: 30px; vertical-align: middle; margin-left: 10px; filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.5)); }
        
        footer { font-size: 14px; color: #000; font-weight: bold; padding: 0 10px; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="logo-box">
            <img src="https://via.placeholder.com/150/ffffff/000000?text=MG" class="logo-img" alt="MG Logo">
        </div>

        <h1><span class="m">M</span><span class="g">G</span> <span class="ai">AI</span> UPDATES</h1>

        <div class="icon-grid">
            <a href="https://topdeal.app.link/niDWGq6PV1b" class="icon-item" target="_blank">
                <div class="circle-btn bg-pink"><i class="fas fa-shopping-cart"></i></div>
                <div class="btn-text">All in one</div>
                <div class="btn-sub">Store</div>
            </a>
            <a href="https://www.youtube.com/@INDO148MG0.2" class="icon-item" target="_blank">
                <div class="circle-btn bg-white"><i class="fab fa-youtube"></i></div>
                <div class="btn-text">Visit Our</div>
                <div class="btn-sub">Channel</div>
            </a>
            <a href="https://t.me/Indo148mg" class="icon-item" target="_blank">
                <div class="circle-btn bg-blue"><i class="fab fa-telegram-plane"></i></div>
                <div class="btn-text">Join</div>
                <div class="btn-sub">Telegram</div>
            </a>
        </div>

        <div class="news-box">
            <strong style="color: #d00;">ताज़ा खबर:</strong> <span>वेबसाइट अब बड़े बटन्स और वर्किंग लोगो के साथ सुपर बड़े और साफ़ दिखेंगे!</span>
        </div>

        <div class="spacer"></div>

        <div class="bottom-section">
            <div class="visitor-box">
                🟢 VISITORS: 
                <img src="https://hitwebcounter.com/counter/counter.php?page=MGAI_BIG_FINAL_OK&style=0005&nbdigits=5&type=page&initCount=0" class="counter-img" alt="counter">
            </div>

            <footer>
                © 2026 MG AI Updates | Managed by Mukund
            </footer>
        </div>
    </div>

</body>
</html>
